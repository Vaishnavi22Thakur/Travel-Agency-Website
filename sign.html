<!DOCTYPE html>
<html>
<head>
<title>Sign Up</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins, sans-serif;
}

body{
  background:url("images/port.jpg") no-repeat center/cover;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
    
.box{
  width:90%;
  max-width:900px;
  background:url("images/sign.jpg") no-repeat center/cover;
  border-radius:20px;
  padding:40px 20px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box1{
  width:100%;
  max-width:350px;
  padding:30px;
  border-radius:15px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.2);
}

h1{
  text-align:center;
  margin-bottom:20px;
}
input{
  width:100%;
  padding:10px;
  margin-top:5px;
  margin-bottom:15px;
  border-radius:8px;
  border:none;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:16px;
  background:white;
  color:purple;
  cursor:pointer;
}

button:hover{
  background:purple;
  color:white;
}

p{
  text-align:center;
  margin-top:15px;
}

a{
  color:blue;
  text-decoration:none;
}

@media(max-width:600px){
  .box{
    padding:20px;
  }
}
</style>

<script>
function sign(){
    const name = document.forms["signup"]["name"].value.trim();
    const email = document.forms["signup"]["email"].value.trim();
    const pass = document.forms["signup"]["pass"].value.trim();
    const number = document.forms["signup"]["number"].value.trim();

    if(!name || !email || !pass || !number){
        alert("Enter all the fields");
        return false;
    }

    if(isNaN(number)){
        alert("Enter mobile number in numbers only");
        return false;
    }

    if(number.length !== 10){
        alert("Enter 10 digit mobile number");
        return false;
    }

    alert("Signup successful! You can login now.");
    window.location.href = "login1.html";
    return true;
}
</script>

</head>

<body>

<div class="box">
  <div class="box1">

    <h1>SIGN UP</h1>

    <form name="signup" onsubmit="return sign()">

      Name:
      <input type="text" name="name">

      E-mail:
      <input type="email" name="email">

      Password:
      <input type="password" name="pass">

      Mobile No:
      <input type="text" name="number">

      <button type="submit">Submit</button>

      <p>
        Already have an account?
        <a href="login1.html">Login</a>
      </p>

    </form>

  </div>
</div>

</body>
</html>
