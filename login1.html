<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins, sans-serif;
}

body{
  background:url("images/port.jpg") no-repeat center/cover;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  width:90%;
  max-width:900px;
  background:url("images/log.jpg") no-repeat center/cover;
  border-radius:20px;
  padding:40px 20px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box1{
  width:100%;
  max-width:350px;
  padding:30px;
  border-radius:15px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.2);
}

h1{
  text-align:center;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
  margin-bottom:15px;
  border-radius:8px;
  border:none;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:16px;
  background:white;
  color:purple;
  cursor:pointer;
}

button:hover{
  background:purple;
  color:white;
}

p{
  text-align:center;
  margin-top:15px;
  font-size:15px;
}

a{
  color:blue;
  text-decoration:none;
}

@media(max-width:600px){
  .box{
    padding:20px;
  }
}
</style>

<script>
function log(){
    const email = document.forms["login"]["email"].value.trim();
    const pass = document.forms["login"]["pass"].value.trim();

    if(!email || !pass){
        alert("Enter all the fields");
        return false;
    }

    alert("Login successful!");
    window.location.href = "index.html";
    return true;
}
</script>

</head>

<body>

<div class="box">
  <div class="box1">

    <h1>LOGIN</h1>

    <form name="login" onsubmit="return log()">

      E-mail:
      <input type="email" name="email" placeholder="Enter your email">

      Password:
      <input type="password" name="pass" placeholder="Enter your password">

      <button type="submit">Submit</button>

      <p>
        Don't have an account?
        <a href="sign.html">Sign up</a>
      </p>

      <p>
        <a href="forgot.html">Forgot Password?</a>
      </p>

    </form>

  </div>
</div>

</body>
</html>
